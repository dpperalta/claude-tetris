<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="game-header">
      <h1 class="game-title">TETRIS</h1>
      <div class="header-controls">
        <div class="skin-selector">
          <span class="label">SKIN</span>
          <select id="skin-select" class="skin-select">
            <option value="retro">Retro</option>
            <option value="neon">Neón</option>
            <option value="pastel">Pastel</option>
            <option value="pixel">Pixel</option>
          </select>
        </div>
        <div class="theme-toggle">
          <span class="label">TEMA</span>
          <label class="toggle-switch">
            <input type="checkbox" id="theme-toggle" />
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </div>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <div id="hs-name-row" class="hs-name-row hidden">
          <input type="text" id="hs-name-input" maxlength="12" placeholder="Tu nombre" />
          <button id="hs-save-btn">Guardar</button>
        </div>
        <div id="overlay-highscores" class="hs-wrapper"></div>
        <button id="restart-btn">Reiniciar</button>

        <div id="pause-menu" class="pm-menu hidden">
          <button class="pm-btn" id="pm-resume">Reanudar</button>
          <button class="pm-btn" id="pm-restart">Reiniciar</button>
          <button class="pm-btn" id="pm-controls">Ver controles</button>

          <div class="pm-level">
            <span class="pm-level-label">Nivel inicial</span>
            <div class="pm-stepper">
              <button class="pm-step" id="pm-level-dec" type="button">−</button>
              <span class="pm-level-value" id="pm-level-value">1</span>
              <button class="pm-step" id="pm-level-inc" type="button">+</button>
            </div>
          </div>

          <ul id="pm-controls-panel" class="pm-controls-panel hidden">
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd><kbd>X</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd><kbd>Esc</kbd> pausa</li>
          </ul>
        </div>
      </div>
    </div>

    <div id="start-overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="start-title">TETRIS</p>
        <div id="start-highscores" class="hs-wrapper"></div>
        <div class="hs-actions">
          <button id="play-btn">Jugar</button>
          <button id="hs-reset-btn" class="hs-reset-btn">Borrar récords</button>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
